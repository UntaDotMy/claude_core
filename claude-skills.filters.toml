# Project-specific declarative filters for `claude-skills run`.
# Place this file in your project root or at .claude-skills/filters.toml
# Docs: https://github.com/UntaDotMy/claude_skills/blob/main/docs/filter-registry.md

# Example: compact cargo test output to failures and summary only
[[filter]]
name = "cargo-test"
description = "Keep test failures, errors, and result summary"
command = "cargo test"
match_mode = "starts_with"
exit_code = 0
keep = ["FAILED", "error", "test result", "running"]
max_lines = 50

# Example: compact eslint to errors and warnings only
[[filter]]
name = "eslint"
description = "Keep ESLint errors and warnings, remove info"
command = "eslint"
match_mode = "contains"
keep = ["error", "warning"]
remove = ["info"]
max_lines = 40

# Example: compact pytest verbose output
[[filter]]
name = "pytest"
description = "Keep pytest failures and passes, filter noise"
command = "pytest"
match_mode = "starts_with"
keep = ["FAILED", "PASSED", "ERROR", "test session"]
remove = ["collecting", "plugins"]
max_lines = 60

# Example: regex match for any npm test command
[[filter]]
name = "npm-test"
description = "Match npm/pnpm/yarn test commands"
command = "^(npm|pnpm|yarn) .*test"
match_mode = "regex"
keep = ["FAIL", "PASS", "error", "Test Suites"]
max_lines = 40

name: Release

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
      - "bootstrap-*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v2026.03.15.0
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release-metadata.outputs.release_tag }}
      build_version: ${{ steps.release-metadata.outputs.build_version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Resolve release metadata
        id: release-metadata
        shell: bash
        run: |
          normalize_release_tag() {
            local raw=$1
            if [[ "$raw" == v* ]]; then
              printf '%s\n' "$raw"
              return 0
            fi
            if [[ "$raw" == [0-9]* ]]; then
              printf 'v%s\n' "$raw"
              return 0
            fi
            printf '%s\n' "$raw"
          }

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            release_tag="$(normalize_release_tag "${{ github.event.inputs.release_tag }}")"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="$(normalize_release_tag "${GITHUB_REF_NAME}")"
          else
            release_tag="bootstrap-${GITHUB_SHA::12}"
          fi

          if [[ "$release_tag" == v[0-9]* ]]; then
            build_version="${release_tag#v}"
          else
            build_version="$release_tag"
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "build_version=$build_version" >> "$GITHUB_OUTPUT"

      - name: Validate
        run: |
          cargo test --workspace
          cargo fmt --all -- --check
          cargo clippy -- -D warnings

  build:
    name: Build ${{ matrix.target }}
    needs: release-preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            os_name: linux
            arch: amd64
            executable: claude-skills
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            os_name: linux
            arch: arm64
            executable: claude-skills
          - target: x86_64-apple-darwin
            os: macos-latest
            os_name: darwin
            arch: amd64
            executable: claude-skills
          - target: aarch64-apple-darwin
            os: macos-latest
            os_name: darwin
            arch: arm64
            executable: claude-skills
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            os_name: windows
            arch: amd64
            executable: claude-skills.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            os_name: windows
            arch: arm64
            executable: claude-skills.exe

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true
      - name: Install cross-compilation linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: Build
        env:
          RUSTFLAGS: -D warnings
          CLAUDE_SKILLS_BUILD_VERSION: ${{ needs.release-preflight.outputs.build_version }}
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage release bundle
        shell: bash
        run: |
          build_version="${{ needs.release-preflight.outputs.build_version }}"
          target_dir="dist/${{ matrix.os_name }}-${{ matrix.arch }}"
          mkdir -p "$target_dir"
          cp "target/${{ matrix.target }}/release/${{ matrix.executable }}" "$target_dir/"
          cp *.md "$target_dir/" || true
          cp -R docs "$target_dir/docs" || true
          for dir in */; do
            if [ -f "${dir}SKILL.md" ]; then
              cp -R "$dir" "$target_dir/"
            fi
          done
          cat > "$target_dir/claude-skills-release-manifest.json" <<EOF
          {
            "package_kind": "packaged_release_bundle",
            "repository_slug": "${{ github.repository }}",
            "release_tag": "${{ needs.release-preflight.outputs.release_tag }}",
            "build_version": "${build_version}",
            "archive_file_name": "claude-skills_${build_version}_${{ matrix.os_name }}_${{ matrix.arch }}.${{ matrix.os_name == 'windows' && 'zip' || 'tar.gz' }}"
          }
          EOF
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          build_version="${{ needs.release-preflight.outputs.build_version }}"
          cd "dist/${{ matrix.os_name }}-${{ matrix.arch }}"
          tar czf "../claude-skills_${build_version}_${{ matrix.os_name }}_${{ matrix.arch }}.tar.gz" .
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          $build_version = "${{ needs.release-preflight.outputs.build_version }}"
          $source = "dist/${{ matrix.os_name }}-${{ matrix.arch }}"
          $dest = "dist/claude-skills_${build_version}_${{ matrix.os_name }}_${{ matrix.arch }}.zip"
          Compress-Archive -Path "$source\*" -DestinationPath "$dest" -Force
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-${{ matrix.os_name }}-${{ matrix.arch }}
          path: dist/claude-skills_${{ needs.release-preflight.outputs.build_version }}_${{ matrix.os_name }}_${{ matrix.arch }}.*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - release-preflight
      - build
    runs-on: ubuntu-latest
    env:
      GH_REPO: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets
      - name: Create or update GitHub release
        shell: bash
        run: |
          release_tag="${{ needs.release-preflight.outputs.release_tag }}"
          if ! gh release view "$release_tag" >/dev/null 2>&1; then
            gh release create "$release_tag" \
              --target "$GITHUB_SHA" \
              --title "$release_tag" \
              --generate-notes
          fi
      - name: Upload release assets
        shell: bash
        run: |
          gh release upload "${{ needs.release-preflight.outputs.release_tag }}" release-assets/* --clobber
